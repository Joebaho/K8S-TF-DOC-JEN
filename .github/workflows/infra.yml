name: Terraform Infrastructure

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_VAR_region: us-west-2
      TF_VAR_cluster_name: automated-demo-cluster
      TF_VAR_environment: production
      TF_VAR_dockerhub_username: joebaho2
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: eks/terraform.tfstate
      TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Validate Terraform backend secrets
        run: |
          test -n "$TF_STATE_BUCKET" || (echo "Missing secret: TF_STATE_BUCKET" && exit 1)
          test -n "$TF_LOCK_TABLE" || (echo "Missing secret: TF_LOCK_TABLE" && exit 1)

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false
