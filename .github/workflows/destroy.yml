name: Destroy Infrastructure (Terraform)

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm infrastructure deletion"
        required: true

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest

    # Same variables as apply workflow
    env:
      TF_VAR_region: us-west-2
      TF_VAR_cluster_name: automated-demo-cluster
      TF_VAR_environment: production
      TF_VAR_dockerhub_username: joebaho2

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "❌ Destruction not confirmed. Type DESTROY exactly."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform destroy -auto-approve -input=false